<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bfdbfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1400" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle circular shapes -->
  <circle cx="100" cy="500" r="220" fill="rgba(147,197,253,0.18)"/>
  <circle cx="1300" cy="100" r="280" fill="rgba(96,165,250,0.15)"/>
  <circle cx="700" cy="600" r="180" fill="rgba(147,197,253,0.12)"/>

  <!-- Medical cross - large background accent left -->
  <rect x="50" y="160" width="22" height="70" rx="5" fill="rgba(30,58,138,0.08)"/>
  <rect x="25" y="185" width="72" height="22" rx="5" fill="rgba(30,58,138,0.08)"/>

  <!-- Medical cross - large background accent right -->
  <rect x="1300" y="280" width="22" height="70" rx="5" fill="rgba(30,58,138,0.07)"/>
  <rect x="1275" y="305" width="72" height="22" rx="5" fill="rgba(30,58,138,0.07)"/>

  <!-- Scattered small crosses -->
  <rect x="350" y="50" width="12" height="36" rx="3" fill="rgba(37,99,235,0.1)"/>
  <rect x="335" y="65" width="42" height="12" rx="3" fill="rgba(37,99,235,0.1)"/>

  <rect x="1050" y="480" width="12" height="36" rx="3" fill="rgba(37,99,235,0.09)"/>
  <rect x="1035" y="495" width="42" height="12" rx="3" fill="rgba(37,99,235,0.09)"/>

  <rect x="900" y="80" width="10" height="30" rx="3" fill="rgba(30,58,138,0.07)"/>
  <rect x="887" y="93" width="36" height="10" rx="3" fill="rgba(30,58,138,0.07)"/>

  <!-- Pill shapes -->
  <ellipse cx="220" cy="80" rx="45" ry="18" fill="rgba(96,165,250,0.18)" transform="rotate(-25,220,80)"/>
  <line x1="220" y1="64" x2="220" y2="97" stroke="rgba(30,58,138,0.15)" stroke-width="1.5" transform="rotate(-25,220,80)"/>

  <ellipse cx="1180" cy="520" rx="50" ry="20" fill="rgba(96,165,250,0.15)" transform="rotate(20,1180,520)"/>
  <line x1="1180" y1="501" x2="1180" y2="539" stroke="rgba(30,58,138,0.12)" stroke-width="1.5" transform="rotate(20,1180,520)"/>

  <ellipse cx="1050" cy="120" rx="38" ry="15" fill="rgba(147,197,253,0.2)" transform="rotate(-15,1050,120)"/>
  <line x1="1050" y1="106" x2="1050" y2="134" stroke="rgba(30,58,138,0.12)" stroke-width="1.5" transform="rotate(-15,1050,120)"/>

  <!-- Stethoscope outline (simplified) -->
  <path d="M480 500 Q500 470 520 490 Q540 510 520 530 Q500 545 490 530 Q488 520 495 515" stroke="rgba(30,58,138,0.12)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- DNA helix suggestion -->
  <path d="M0 340 Q175 280 350 340 Q525 400 700 340 Q875 280 1050 340 Q1225 400 1400 340" stroke="rgba(96,165,250,0.2)" stroke-width="2" fill="none"/>
  <path d="M0 360 Q175 300 350 360 Q525 420 700 360 Q875 300 1050 360 Q1225 420 1400 360" stroke="rgba(96,165,250,0.15)" stroke-width="2" fill="none"/>

  <!-- Connection dots on helix -->
  <circle cx="175" cy="310" r="3.5" fill="rgba(59,130,246,0.25)"/>
  <circle cx="350" cy="350" r="3.5" fill="rgba(59,130,246,0.25)"/>
  <circle cx="525" cy="310" r="3.5" fill="rgba(59,130,246,0.25)"/>
  <circle cx="700" cy="350" r="3.5" fill="rgba(59,130,246,0.25)"/>
  <circle cx="875" cy="310" r="3.5" fill="rgba(59,130,246,0.25)"/>
  <circle cx="1050" cy="350" r="3.5" fill="rgba(59,130,246,0.25)"/>
  <circle cx="1225" cy="310" r="3.5" fill="rgba(59,130,246,0.25)"/>

  <!-- Molecule dots (top right area) -->
  <circle cx="1100" cy="200" r="6" fill="rgba(96,165,250,0.25)"/>
  <circle cx="1140" cy="170" r="5" fill="rgba(96,165,250,0.2)"/>
  <circle cx="1160" cy="210" r="4" fill="rgba(96,165,250,0.18)"/>
  <line x1="1100" y1="200" x2="1140" y2="170" stroke="rgba(96,165,250,0.18)" stroke-width="1.5"/>
  <line x1="1140" y1="170" x2="1160" y2="210" stroke="rgba(96,165,250,0.18)" stroke-width="1.5"/>
  <line x1="1100" y1="200" x2="1160" y2="210" stroke="rgba(96,165,250,0.18)" stroke-width="1.5"/>

  <!-- Molecule dots (bottom left area) -->
  <circle cx="300" cy="450" r="6" fill="rgba(96,165,250,0.22)"/>
  <circle cx="260" cy="430" r="5" fill="rgba(96,165,250,0.18)"/>
  <circle cx="280" cy="470" r="4" fill="rgba(96,165,250,0.16)"/>
  <line x1="300" y1="450" x2="260" y2="430" stroke="rgba(96,165,250,0.15)" stroke-width="1.5"/>
  <line x1="260" y1="430" x2="280" y2="470" stroke="rgba(96,165,250,0.15)" stroke-width="1.5"/>
  <line x1="300" y1="450" x2="280" y2="470" stroke="rgba(96,165,250,0.15)" stroke-width="1.5"/>
</svg>
