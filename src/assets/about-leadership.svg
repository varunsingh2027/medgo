<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd9b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5c689;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="190"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="198" fill="url(#bgGrad)" stroke="#93c5fd" stroke-width="4"/>

  <!-- Background medical cross accent -->
  <rect x="320" y="40" width="14" height="44" rx="4" fill="rgba(96,165,250,0.3)"/>
  <rect x="303" y="57" width="48" height="14" rx="4" fill="rgba(96,165,250,0.3)"/>

  <rect x="50" y="310" width="12" height="36" rx="4" fill="rgba(96,165,250,0.25)"/>
  <rect x="35" y="325" width="42" height="12" rx="4" fill="rgba(96,165,250,0.25)"/>

  <!-- Clipped content -->
  <g clip-path="url(#circleClip)">
    <!-- Torso / suit -->
    <path d="M80 430 Q80 310 120 270 Q150 250 200 245 Q250 250 280 270 Q320 310 320 430 Z" fill="url(#suitGrad)"/>

    <!-- White shirt collar / tie area -->
    <path d="M180 245 L200 290 L220 245 Q210 240 200 240 Q190 240 180 245Z" fill="white"/>
    <!-- Tie -->
    <path d="M197 255 L200 330 L203 255 Q200 250 197 255Z" fill="#dc2626"/>
    <path d="M193 265 L207 265 L203 255 L197 255Z" fill="#b91c1c"/>

    <!-- Collar left -->
    <path d="M180 245 Q165 255 155 270 L170 268 Q175 258 185 252Z" fill="white"/>
    <!-- Collar right -->
    <path d="M220 245 Q235 255 245 270 L230 268 Q225 258 215 252Z" fill="white"/>

    <!-- Jacket lapels -->
    <path d="M120 270 Q130 280 150 290 Q160 275 170 268 Q155 265 145 275 Z" fill="#1e3a8a"/>
    <path d="M280 270 Q270 280 250 290 Q240 275 230 268 Q245 265 255 275 Z" fill="#1e3a8a"/>

    <!-- Arms -->
    <path d="M120 275 Q90 310 85 370 Q95 375 110 370 Q112 325 135 295 Z" fill="url(#suitGrad)"/>
    <path d="M280 275 Q310 310 315 370 Q305 375 290 370 Q288 325 265 295 Z" fill="url(#suitGrad)"/>

    <!-- Hands -->
    <ellipse cx="95" cy="380" rx="16" ry="10" fill="url(#skinGrad)"/>
    <ellipse cx="305" cy="380" rx="16" ry="10" fill="url(#skinGrad)"/>

    <!-- Neck -->
    <rect x="183" y="200" width="34" height="52" rx="10" fill="url(#skinGrad)"/>

    <!-- Head -->
    <ellipse cx="200" cy="165" rx="65" ry="72" fill="url(#skinGrad)"/>

    <!-- Hair -->
    <path d="M135 150 Q140 95 200 90 Q260 95 265 150 Q255 130 240 120 Q220 108 200 108 Q180 108 160 120 Q145 130 135 150Z" fill="#4b3621"/>

    <!-- Ears -->
    <ellipse cx="135" cy="165" rx="10" ry="14" fill="#f0b97d"/>
    <ellipse cx="265" cy="165" rx="10" ry="14" fill="#f0b97d"/>

    <!-- Eyes -->
    <ellipse cx="178" cy="158" rx="10" ry="7" fill="white"/>
    <ellipse cx="222" cy="158" rx="10" ry="7" fill="white"/>
    <circle cx="180" cy="158" r="5" fill="#4b3621"/>
    <circle cx="224" cy="158" r="5" fill="#4b3621"/>
    <circle cx="181" cy="156" r="1.5" fill="white"/>
    <circle cx="225" cy="156" r="1.5" fill="white"/>

    <!-- Eyebrows -->
    <path d="M167 148 Q178 143 188 147" stroke="#4b3621" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M212 147 Q222 143 233 148" stroke="#4b3621" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M197 162 Q193 178 196 182 Q200 185 204 182 Q207 178 203 162" stroke="#d4956a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Smile -->
    <path d="M186 193 Q200 202 214 193" stroke="#c0724a" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Glasses (optional professional touch) -->
    <rect x="165" y="151" width="30" height="18" rx="6" fill="none" stroke="#4b3621" stroke-width="1.5" opacity="0.6"/>
    <rect x="205" y="151" width="30" height="18" rx="6" fill="none" stroke="#4b3621" stroke-width="1.5" opacity="0.6"/>
    <line x1="195" y1="160" x2="205" y2="160" stroke="#4b3621" stroke-width="1.5" opacity="0.6"/>
    <line x1="135" y1="160" x2="165" y2="160" stroke="#4b3621" stroke-width="1.5" opacity="0.6"/>
    <line x1="235" y1="160" x2="265" y2="160" stroke="#4b3621" stroke-width="1.5" opacity="0.6"/>

    <!-- Stethoscope around neck (professional medical touch) -->
    <path d="M168 220 Q160 235 165 250 Q170 260 180 258 Q190 255 190 245 Q190 238 183 235" stroke="#4b5563" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="168" cy="220" r="5" fill="#6b7280" stroke="#4b5563" stroke-width="1"/>
  </g>
</svg>
